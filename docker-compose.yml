services:
  polyphase_claw:
    build: .
    environment:
      POLYPHASE_REPO: ${POLYPHASE_REPO:-https://github.com/Polyphase-Labs/Polyphase-Engine}
      OPENCLAW_HOME: /data/openclaw
      SYNC_MODE: "false"
      # ALLOWED_ORIGINS: "http://localhost:3348,https://myhost.example.com"
      # GATEWAY_TOKEN: "my-secret-token"
    ports:
      - "3348:3000"
    volumes:
      - openclaw_polyphase_state:/data/openclaw
    tty: true
    stdin_open: true

volumes:
  openclaw_polyphase_state:
