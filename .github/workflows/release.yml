name: Release

# Fires when a tag matching v* is pushed (e.g. v1.0.0, v2026.5.10).
# Builds the Docker image, pushes it to Docker Hub with three tags
# (latest, full tag, semver components), and creates a GitHub Release
# whose body is auto-generated from commits since the previous tag.
#
# Required repository secrets (Settings → Secrets and variables → Actions → Secrets):
#   DOCKERHUB_USERNAME — your Docker Hub login (e.g. "polyphaselabs")
#   DOCKERHUB_TOKEN    — a Docker Hub access token, NOT your password.
#                        Create at https://hub.docker.com/settings/security
#                        (Read & Write scope on the target repo is enough).
#
# Optional repository variable (Settings → Secrets and variables → Actions → Variables):
#   DOCKERHUB_IMAGE    — Override the image namespace/name.
#                        Defaults to "polyphaselabs/polyphase-dev-claw".
#                        Set this if you fork the repo or publish under a
#                        different Docker Hub org.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # softprops/action-gh-release needs this to create the Release

jobs:
  release:
    name: Build, push, and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Derive useful values from the tag.
      # - version  = tag without the leading "v"   (e.g. v1.2.3 → 1.2.3)
      # - image    = full image reference          (uses DOCKERHUB_IMAGE var or default)
      - name: Compute version and image refs
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          image="${{ vars.DOCKERHUB_IMAGE }}"
          if [ -z "$image" ]; then
            image="polyphaselabs/polyphase-dev-claw"
          fi
          echo "tag=$tag"           >> "$GITHUB_OUTPUT"
          echo "version=$version"   >> "$GITHUB_OUTPUT"
          echo "image=$image"       >> "$GITHUB_OUTPUT"
          echo "::notice::Building $image:$version (tag $tag)"

      # QEMU + Buildx so we can produce a multi-arch image (amd64 + arm64).
      # Docker Hub readers on Apple Silicon and aarch64 servers will pull
      # the right native variant without emulation at runtime.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker/metadata-action generates a clean set of tags + OCI labels
      # from the git tag. With type=semver we automatically get:
      #   - 1.2.3        (full version)
      #   - 1.2          (minor)
      #   - 1            (major)
      #   - latest       (only on a real release, not pre-release)
      # Plus OpenContainers labels (org.opencontainers.image.*) so the
      # image page on Docker Hub shows the correct revision/source.
      - name: Compute Docker tags + labels
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          # Cache to GitHub Actions cache so re-pushing the same tag (or
          # tagging from a similar commit) is fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Create the GitHub Release after the push succeeds. generate_release_notes
      # auto-fills the body with commit titles + PR links since the previous tag.
      # Marks pre-release automatically if the tag contains a hyphen (v1.0.0-rc1).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          body: |
            Docker image: `${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}`

            ```bash
            docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            # or
            docker pull ${{ steps.meta.outputs.image }}:latest
            ```
